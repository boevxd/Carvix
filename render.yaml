databases:
  - name: carvix-db
    plan: free
    databaseName: carvix
    user: carvix

services:
  - type: web
    name: carvix
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: carvix-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
