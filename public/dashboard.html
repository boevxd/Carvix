<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carvix — Личный кабинет</title>
  <link rel="icon" type="image/png" href="/images/logo.png" />
  <link rel="apple-touch-icon" href="/images/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .dash {
      width: min(880px, 100%);
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(18px) saturate(140%);
      border: 1px solid rgba(255,255,255,.8);
      border-radius: 28px;
      padding: 48px;
      box-shadow: var(--shadow-card);
      animation: card-in .8s var(--ease) both;
    }
    .dash__head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
      margin-bottom: 28px;
    }
    .dash__brand {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 22px;
    }
    .dash__logo {
      width: 110px;
      display: block;
    }
    .dash__logo img {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 6px 14px rgba(120, 90, 40, .22));
    }
    .dash__brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; font-weight: 600; letter-spacing: -.3px;
    }
    .dash__title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px; font-weight: 600;
      margin: 0;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent); color: #fff;
      padding: 8px 14px; border-radius: 999px;
      font-size: 13px; font-weight: 600;
      box-shadow: 0 8px 22px -10px rgba(28,27,23,.5);
    }
    .badge .dot { background: #fff; box-shadow: 0 0 0 3px rgba(255,255,255,.25); }
    .info-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }
    .info {
      padding: 18px 20px;
      border-radius: 18px;
      background: var(--beige-50);
      border: 1px solid var(--gray-100);
    }
    .info__label { font-size: 12px; text-transform: uppercase; letter-spacing: .8px; color: var(--gray-500); margin-bottom: 6px; }
    .info__value { font-size: 18px; font-weight: 600; color: var(--gray-900); }
    .actions { display: flex; gap: 10px; }
    .btn-ghost {
      flex: 1;
      height: 48px;
      border-radius: 14px;
      border: 1px solid var(--gray-200);
      background: #fff;
      color: var(--gray-700);
      font-weight: 600;
      cursor: pointer;
      transition: all .25s var(--ease);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
    @media (max-width: 560px) { .info-grid { grid-template-columns: 1fr; } .dash { padding: 32px 24px; } }
  </style>
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
    <span class="grid-pattern"></span>
  </div>

  <main class="page">
    <section class="dash">
      <div class="dash__brand">
        <div class="dash__logo"><img src="/images/logo.png" alt="Carvix" /></div>
        <span class="dash__brand-name">Carvix</span>
      </div>
      <div class="dash__head">
        <div>
          <h1 class="dash__title">Здравствуйте, <span id="firstName">пользователь</span></h1>
          <p style="color: var(--gray-500); margin: 6px 0 0;">Добро пожаловать в&nbsp;Carvix</p>
        </div>
        <span class="badge"><span class="dot"></span><span id="roleBadge">—</span></span>
      </div>

      <div class="info-grid">
        <div class="info"><div class="info__label">ФИО</div><div class="info__value" id="fio">—</div></div>
        <div class="info"><div class="info__label">Логин</div><div class="info__value" id="login">—</div></div>
        <div class="info"><div class="info__label">Роль</div><div class="info__value" id="role">—</div></div>
        <div class="info"><div class="info__label">Подразделение</div><div class="info__value" id="podr">—</div></div>
      </div>

      <div class="actions">
        <button class="btn-ghost" id="logoutBtn">Выйти</button>
        <a class="btn-primary" id="goToAppBtn" href="/app.html" style="margin: 0; text-decoration: none;">
          <span>Перейти к работе</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </a>
      </div>
    </section>
  </main>

  <script>
    const token = localStorage.getItem('carvix_token');
    if (!token) location.replace('/');

    fetch('/api/auth/me', { headers: { Authorization: `Bearer ${token}` } })
      .then((r) => {
        if (!r.ok) throw new Error('unauth');
        return r.json();
      })
      .then((u) => {
        document.getElementById('firstName').textContent = (u.fio || '').split(' ')[0] || 'пользователь';
        document.getElementById('fio').textContent = u.fio;
        document.getElementById('login').textContent = u.login;
        document.getElementById('role').textContent = u.rol_nazvanie;
        document.getElementById('roleBadge').textContent = u.rol_nazvanie;
        document.getElementById('podr').textContent = u.podrazdelenie_nazvanie;
      })
      .catch(() => {
        localStorage.removeItem('carvix_token');
        localStorage.removeItem('carvix_user');
        location.replace('/');
      });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('carvix_token');
      localStorage.removeItem('carvix_user');
      location.replace('/');
    });
  </script>
</body>
</html>
