<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Carvix</title>
  <link rel="icon" type="image/png" href="/images/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/app.css" />
  <!-- Тема применяется ДО первого paint, чтобы избежать вспышки светом -->
  <script src="/theme.js"></script>
  <script src="/i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body class="app-body">
  <aside class="sidebar">
    <a href="#dashboard" class="sidebar__brand">
      <img src="/images/logo.png" alt="Carvix" class="sidebar__logo" />
      <span>Carvix</span>
    </a>

    <nav class="sidebar__nav" id="nav">
      <a href="#dashboard" class="nav__item" data-section="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
        <span data-i18n="nav.dashboard">Дашборд</span>
      </a>
      <a href="#expenses" class="nav__item" data-section="expenses">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        <span data-i18n="nav.expenses">Расходы</span>
      </a>
      <a href="#budgets" class="nav__item" data-section="budgets">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/></svg>
        <span data-i18n="nav.budgets">Бюджеты</span>
      </a>
      <a href="#tco" class="nav__item" data-section="tco">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 16h-7m11 0h.01M5 16V8.5C5 7.7 5.7 7 6.5 7h11c.8 0 1.5.7 1.5 1.5V16"/><circle cx="7.5" cy="17" r="1.5"/><circle cx="16.5" cy="17" r="1.5"/></svg>
        <span data-i18n="nav.tco">Парк (TCO)</span>
      </a>
      <a href="#receipts" class="nav__item" data-section="receipts">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/></svg>
        <span data-i18n="nav.receipts">Приходы</span>
      </a>
      <a href="#audit" class="nav__item" data-section="audit">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v4H3zM3 11h18v4H3zM3 19h18v2H3z"/></svg>
        <span data-i18n="nav.audit">Журнал</span>
      </a>
    </nav>

    <!-- Переключатели: тема + язык -->
    <div class="sidebar__settings">
      <button class="sb-toggle" id="themeToggle" data-i18n-title="common.theme" title="Тема">
        <svg id="iconSun"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>

      <div class="lang-toggle" role="tablist">
        <button class="lang-toggle__btn" data-lang="ru" type="button">RU</button>
        <button class="lang-toggle__btn" data-lang="en" type="button">EN</button>
      </div>
    </div>

    <div class="sidebar__user">
      <div class="user__avatar" id="userAvatar">—</div>
      <div class="user__meta">
        <div class="user__name" id="userName">—</div>
        <div class="user__role" id="userRole">—</div>
      </div>
      <button class="user__logout" id="logoutBtn" data-i18n-title="common.logout" title="Выйти">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <main class="content" id="content">
    <div class="loading-screen">
      <div class="spinner"></div>
      <div data-i18n="common.loading">Загрузка…</div>
    </div>
  </main>

  <div id="toast"></div>

  <script src="/app.js"></script>
  <script src="/app-extras.js"></script>
</body>
</html>
